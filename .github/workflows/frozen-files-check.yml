name: Frozen Files Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  frozen-files-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allow only agent-editable files
        shell: bash
        run: |
          changed_files="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          allowed_files=(
            "feature_engineering.py"
            "model.py"
            ".github/workflows/frozen-files-check.yml"
          )

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            if ! printf '%s\n' "${allowed_files[@]}" | grep -Fxq "$file"; then
              echo "Only feature_engineering.py and model.py may be changed."
              echo "Unexpected file: $file"
              exit 1
            fi
          done <<< "$changed_files"
